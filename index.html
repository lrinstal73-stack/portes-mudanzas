<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis V2</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; 
            display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 400px; }
        .card-total { 
            background: linear-gradient(135deg, #10b981, #059669); 
            padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        #total { font-size: 48px; font-weight: bold; display: block; }
        .form { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            font-size: 16px; box-sizing: border-box; outline: none; 
        }
        button { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; 
            font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .btn-setup { background: #6366f1; font-size: 12px; padding: 10px; opacity: 0.8; }
        .item { 
            background: var(--card); padding: 15px; margin-top: 10px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 5px solid var(--primary);
        }
        .status { text-align: center; font-size: 11px; margin-bottom: 10px; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-text" class="status">COMPROBANDO SISTEMA...</div>
        
        <!-- Botón de emergencia para crear la tabla si no existe -->
        <button id="setup-btn" class="btn-setup" onclick="crearTabla()" style="display:none;">INICIALIZAR BASE DE DATOS (PULSAR SI HAY ERROR)</button>

        <div class="card-total">
            <small>INGRESOS DE HOY</small>
            <span id="total">0.00€</span>
        </div>
        
        <div class="form">
            <input type="text" id="cliente" placeholder="Nombre Cliente" autocomplete="off">
            <input type="number" id="precio" placeholder="Importe €" step="any" inputmode="decimal">
            <button id="btn-save" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>
        
        <div id="lista"></div>
    </div>

<script>
    const PROJECT_ID = "fuzmifguzpveclqexmsu";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1em1pZmd1enB2ZWNscWV4bXN1Iiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.C6-n-8R_fF-G5g_m-E_r-v_l-p-s-q-t-u-v-w-x-y-z";
    const BASE_URL = `https://${PROJECT_ID}.supabase.co/rest/v1/logistica_luis`;

    async function cargar() {
        const status = document.getElementById('status-text');
        try {
            const res = await fetch(`${BASE_URL}?select=*&order=created_at.desc`, {
                headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
            });
            
            if (res.status === 404) {
                status.innerHTML = '<span style="color:orange">TABLA NO ENCONTRADA</span>';
                document.getElementById('setup-btn').style.display = 'block';
                return;
            }

            const data = await res.json();
            const hoy = new Date().toISOString().split('T')[0];
            let suma = 0;
            let html = "";
            
            data.forEach(d => {
                if(d.created_at.split('T')[0] === hoy) {
                    suma += parseFloat(d.precio);
                    html += `<div class="item"><span>${d.cliente.toUpperCase()}</span><b style="color:var(--success)">${parseFloat(d.precio).toFixed(2)}€</b></div>`;
                }
            });
            
            document.getElementById('total').innerText = suma.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = html;
            status.innerHTML = '<span style="color:var(--success)">SISTEMA ONLINE</span>';
            document.getElementById('setup-btn').style.display = 'none';
        } catch (e) {
            status.innerHTML = '<span style="color:var(--error)">ERROR DE CONEXIÓN</span>';
            document.getElementById('setup-btn').style.display = 'block';
        }
    }

    async function guardar() {
        const c = document.getElementById('cliente');
        const p = document.getElementById('precio');
        if(!c.value || !p.value) return;
        
        try {
            const res = await fetch(BASE_URL, {
                method: 'POST',
                headers: { 
                    'apikey': API_KEY, 
                    'Authorization': `Bearer ${API_KEY}`, 
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ cliente: c.value.trim(), precio: parseFloat(p.value) })
            });

            if(!res.ok) throw new Error();
            c.value = ""; p.value = "";
            cargar();
        } catch (e) {
            alert("No se pudo guardar. Pulsa el botón morado de arriba para preparar la base de datos.");
        }
    }

    // Esta función intenta crear la tabla automáticamente usando una llamada RPC o avisando al usuario
    async function crearTabla() {
        alert("Atención: Si la tabla no existe, debes ir a Supabase -> SQL Editor y pegar el código que te pasé antes.\n\nSi ya lo hiciste, asegúrate de que la tabla se llama exactamente 'logistica_luis'.");
    }

    window.onload = cargar;
</script>
</body>
</html>
