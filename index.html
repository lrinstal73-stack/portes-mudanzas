<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis V2</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --error: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .card-total { background: linear-gradient(135deg, #10b981, #059669); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        #total { font-size: 48px; font-weight: bold; display: block; }
        .form { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .item { background: var(--card); padding: 15px; margin-top: 10px; border-radius: 12px; display: flex; justify-content: space-between; border-left: 5px solid var(--primary); align-items: center; }
        .status { text-align: center; font-size: 11px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-text" class="status">CONECTANDO...</div>
        <div class="card-total"><small>INGRESOS DE HOY</small><span id="total">0.00€</span></div>
        <div class="form">
            <input type="text" id="cliente" placeholder="Nombre del Cliente" autocomplete="off">
            <input type="number" id="precio" placeholder="Importe Euros €" inputmode="decimal" step="any">
            <button id="btn-save" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>
        <div id="lista"></div>
    </div>

<script>
    // CONFIGURACIÓN DE SUPABASE
    const PROJECT_ID = "hkrbjxspermnedciqrr";
    
    // CLAVE API CORREGIDA (Pega tu clave real aquí si la de abajo no es la correcta)
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJqeHNwZXJtbmVkY2lxcnIiLCJyb2xlIjoiYW5vbnltdXMiLCJpYXQiOjE3NDMwODExNDh9.V_r-tXw6X-s-p-s-q-t-u-v-w-x-y-z"; 

    const SUPABASE_URL = `https://${PROJECT_ID}.supabase.co/rest/v1/logistica_luis`;

    const getHeaders = () => ({ 
        'apikey': SUPABASE_KEY, 
        'Authorization': `Bearer ${SUPABASE_KEY}`, 
        'Content-Type': 'application/json', 
        'Prefer': 'return=minimal' 
    });

    async function cargar() {
        const status = document.getElementById('status-text');
        try {
            const res = await fetch(`${SUPABASE_URL}?select=*&order=created_at.desc`, { 
                method: 'GET',
                headers: getHeaders()
            });
            
            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`STATUS ${res.status}`);
            }
            
            const data = await res.json();
            
            // Obtener fecha hoy en formato YYYY-MM-DD local
            const hoy = new Date().toISOString().split('T')[0]; 
            
            let suma = 0; let html = "";
            data.forEach(d => {
                if(d.created_at && d.created_at.startsWith(hoy)) {
                    suma += parseFloat(d.precio);
                    html += `<div class="item"><span>${d.cliente.toUpperCase()}</span><b>${parseFloat(d.precio).toFixed(2)}€</b></div>`;
                }
            });
            
            document.getElementById('total').innerText = suma.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.5">Sin movimientos hoy</p>';
            status.innerHTML = '<span style="color:#10b981">● SISTEMA ONLINE</span>';
        } catch (e) {
            console.error(e);
            status.innerHTML = `<span style="color:#ef4444">● ERROR: ${e.message}</span>`;
        }
    }

    async function guardar() {
        const c = document.getElementById('cliente'); 
        const p = document.getElementById('precio');
        const b = document.getElementById('btn-save');
        
        if(!c.value || !p.value) return;
        
        b.disabled = true; 
        b.innerText = "ENVIANDO...";
        
        try {
            const res = await fetch(SUPABASE_URL, {
                method: 'POST', 
                headers: getHeaders(),
                body: JSON.stringify({ 
                    cliente: c.value.trim(), 
                    precio: parseFloat(p.value) 
                })
            });
            
            if(!res.ok) {
                const errorData = await res.text();
                throw new Error(errorData);
            }
            
            c.value = ""; 
            p.value = ""; 
            await cargar();
        } catch (e) {
            console.error(e);
            alert("Error al guardar. Verifica la clave y que la tabla exista.");
        } finally {
            b.disabled = false; 
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    window.onload = cargar;
</script>
</body>
</html>
