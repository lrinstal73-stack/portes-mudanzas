<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Luis | Control de Portes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --dark: #0f1014; --card: #1c1d24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .resumen { background: var(--success); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .resumen small { text-transform: uppercase; opacity: 0.8; font-size: 0.7rem; }
        .resumen div { font-size: 2.5rem; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        input { background: #25262e; color: white; border: 1px solid #333; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .lista { margin-top: 30px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; position: relative; border-left: 5px solid var(--primary); }
        .precio { position: absolute; top: 15px; right: 15px; color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="resumen">
        <small>INGRESOS TOTALES</small>
        <div id="balance">0€</div>
    </div>

    <input type="text" id="cliente" placeholder="Nombre del Cliente">
    <input type="number" id="precio" placeholder="Precio (€)">
    <input type="text" id="ruta" placeholder="Origen / Ruta">
    <button onclick="guardar()">GUARDAR EN NUBE</button>

    <div class="lista" id="lista-portes"></div>
</div>

<script>
    const SB_URL = "https://hkrbyjxspermnedciqrr.supabase.co";
    // Clave Saneada: He quitado el texto duplicado del final
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzE2OSwiZXhwIjoyMDU4NjUzMTY5fQ.mHnZSi6ImFubzcy";
    
    // Inicialización usando window para asegurar carga
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    async function cargarDatos() {
        try {
            const { data, error } = await supabaseClient.from('portes').select('*').order('created_at', { ascending: false });
            if (error) throw error;

            let total = data.reduce((acc, p) => acc + (Number(p.precio) || 0), 0);
            document.getElementById('balance').innerText = total + "€";

            document.getElementById('lista-portes').innerHTML = data.map(p => `
                <div class="card">
                    <div class="precio">${p.precio}€</div>
                    <div style="font-weight:bold;">${p.cliente}</div>
                    <div style="font-size:0.8rem; color:#aaa;">📍 ${p.origen || 'Sin ruta'}</div>
                </div>
            `).join('');
        } catch (err) {
            console.error("Error Lili:", err.message);
        }
    }

    async function guardar() {
        const cli = document.getElementById('cliente').value;
        const pre = document.getElementById('precio').value;
        const rut = document.getElementById('ruta').value;

        if(!cli || !pre) return alert("Luis, pon nombre y precio");

        const { error } = await supabaseClient.from('portes').insert([
            { cliente: cli, precio: parseInt(pre), origen: rut }
        ]);

        if (error) {
            alert("Error de API: " + error.message);
        } else {
            alert("¡Porte guardado con éxito!");
            document.getElementById('cliente').value = "";
            document.getElementById('precio').value = "";
            document.getElementById('ruta').value = "";
            cargarDatos();
        }
    }

    cargarDatos();
</script>
</body>
</html>
