<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis - Gestión Total</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
            --danger: #ef4444;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        #balance-card { 
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 30px 20px; border-radius: 24px; 
            text-align: center; margin-bottom: 25px; 
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
        }
        #bal { font-size: 48px; font-weight: 900; display: block; letter-spacing: -1px; }
        
        .form-box { 
            background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        input { 
            width: 100%; padding: 16px; margin-bottom: 12px; 
            border-radius: 12px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; 
            outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        button#btnG { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: var(--primary); color: white; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        button#btnG:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; }

        .item { 
            background: var(--card); padding: 16px; margin-bottom: 10px; 
            border-radius: 15px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 5px solid var(--primary);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .price { font-weight: 800; color: var(--success); font-size: 19px; }

        #error-display {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px; border-radius: 12px;
            margin-bottom: 15px; display: none;
            font-size: 13px; text-align: center;
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--primary); font-size:20px; margin:0; font-weight:800;">LOGÍSTICA LUIS</h2>
            <button onclick="cargar()" style="background:none; border:1px solid #334155; color:var(--text); padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer;">ACTUALIZAR</button>
        </div>

        <div id="error-display" onclick="this.style.display='none'"></div>

        <div id="balance-card">
            <span style="font-size:12px; font-weight:bold; text-transform:uppercase; opacity:0.9; letter-spacing:1px;">Ganancia de Hoy</span>
            <span id="bal">0.00€</span>
        </div>

        <div class="form-box">
            <input type="text" id="cli" placeholder="Nombre del cliente..." autocomplete="off">
            <input type="number" id="pre" placeholder="Importe (€)" inputmode="decimal">
            <button id="btnG">GUARDAR REGISTRO</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    const URL_BASE = "https://hkrbyjxspermnedciqrr.supabase.co/rest/v1/logistica_luis";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo";

    function err(m) {
        console.error(m);
        const d = document.getElementById('error-display');
        d.innerText = m + " (Toca para reintentar)";
        d.style.display = 'block';
    }

    async function cargar() {
        try {
            const d = new Date();
            d.setHours(0,0,0,0);
            const fechaFiltro = d.toISOString();

            // Usamos una petición simple para evitar problemas de CORS preflight
            const res = await fetch(`${URL_BASE}?select=*&created_at=gte.${fechaFiltro}&order=created_at.desc`, {
                method: 'GET',
                headers: {
                    'apikey': API_KEY,
                    'Authorization': 'Bearer ' + API_KEY
                }
            });

            if (!res.ok) throw new Error("Fallo en servidor: " + res.status);

            const data = await res.json();
            let sum = 0;
            let h = "";
            
            data.forEach(x => {
                const p = parseFloat(x.precio) || 0;
                sum += p;
                h += `<div class="item"><span><b>${x.cliente.toUpperCase()}</b></span><span class="price">${p.toFixed(2)}€</span></div>`;
            });

            document.getElementById('bal').innerText = sum.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = h || "<p style='text-align:center;opacity:0.5;margin-top:20px;'>No hay portes hoy.</p>";
            document.getElementById('error-display').style.display = 'none';
        } catch (e) {
            err("Error al conectar. Verifica tu conexión.");
        }
    }

    async function guardar() {
        const c = document.getElementById('cli');
        const p = document.getElementById('pre');
        const b = document.getElementById('btnG');

        if (!c.value || !p.value) return;

        b.disabled = true;
        b.innerText = "PROCESANDO...";

        try {
            const res = await fetch(URL_BASE, {
                method: "POST",
                headers: {
                    "apikey": API_KEY,
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify({
                    cliente: c.value.trim(),
                    precio: parseFloat(p.value)
                })
            });

            if (!res.ok) throw new Error("Error al enviar");

            c.value = ""; 
            p.value = "";
            await cargar();
        } catch (e) {
            err("Error al guardar. Reintenta en unos segundos.");
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    // Iniciar carga
    window.onload = cargar;
    document.getElementById('btnG').onclick = guardar;
    document.getElementById('error-display').onclick = cargar;
</script>
</body>
</html>
