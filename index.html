<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis - Gestión</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        #balance-card { 
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 25px 15px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #bal { font-size: 42px; font-weight: 900; display: block; }
        
        .form-box { 
            background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 20px;
        }
        input { 
            width: 100%; padding: 14px; margin-bottom: 10px; 
            border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; 
            outline: none;
        }
        
        button#btnG { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; font-weight: bold; 
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }

        .item { 
            background: var(--card); padding: 14px; margin-bottom: 8px; 
            border-radius: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--primary);
        }
        .price { font-weight: 800; color: var(--success); font-size: 18px; }

        .status-badge {
            font-size: 10px; text-align: center; margin-bottom: 10px; 
            padding: 6px; border-radius: 6px; text-transform: uppercase; font-weight: bold;
        }
        .status-ok { background: #064e3b; color: #10b981; }
        .status-err { background: #7f1d1d; color: #f87171; }
        
        .empty-state { text-align: center; opacity: 0.5; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" class="status-badge">Verificando conexión...</div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--primary); font-size:18px; margin:0; font-weight:800;">LOGÍSTICA LUIS</h2>
            <button onclick="cargar()" style="background:none; border:1px solid #334155; color:var(--text); padding:5px 10px; border-radius:8px; font-size:11px;">REINTENTAR</button>
        </div>

        <div id="balance-card">
            <span style="font-size:11px; font-weight:bold; text-transform:uppercase; opacity:0.9;">Total Hoy</span>
            <span id="bal">0.00€</span>
        </div>

        <div class="form-box">
            <input type="text" id="cli" placeholder="Nombre del Cliente" autocomplete="off">
            <input type="number" id="pre" placeholder="Importe €" inputmode="decimal" step="any">
            <button id="btnG">GUARDAR REGISTRO</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    const URL_BASE = "https://hkrbyjxspermnedciqrr.supabase.co/rest/v1/logistica_luis";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo";

    async function cargar() {
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('lista');
        
        try {
            // Petición al API de Supabase
            const res = await fetch(`${URL_BASE}?select=*&order=created_at.desc`, {
                headers: { 
                    'apikey': API_KEY, 
                    'Authorization': 'Bearer ' + API_KEY,
                    'Content-Type': 'application/json'
                }
            });

            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.message || "Falla de RLS");
            }

            const data = await res.json();
            
            // Lógica de fecha local robusta
            const ahora = new Date();
            const hoy = ahora.getFullYear() + '-' + 
                        String(ahora.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(ahora.getDate()).padStart(2, '0');
            
            let total = 0;
            let html = "";
            
            data.forEach(item => {
                const fechaItem = item.created_at.split('T')[0];
                if (fechaItem === hoy) {
                    const precio = parseFloat(item.precio) || 0;
                    total += precio;
                    html += `<div class="item">
                                <span><b>${item.cliente.toUpperCase()}</b></span>
                                <span class="price">${precio.toFixed(2)}€</span>
                             </div>`;
                }
            });

            document.getElementById('bal').innerText = total.toFixed(2) + "€";
            listEl.innerHTML = html || "<div class='empty-state'>Aún no hay registros de hoy.</div>";
            
            statusEl.innerText = "SISTEMA CONECTADO";
            statusEl.className = "status-badge status-ok";
        } catch (e) {
            console.error(e);
            statusEl.innerText = "ERROR DE PERMISOS (RLS)";
            statusEl.className = "status-badge status-err";
        }
    }

    async function guardar() {
        const c = document.getElementById('cli');
        const p = document.getElementById('pre');
        const b = document.getElementById('btnG');

        if (!c.value || !p.value) return;
        b.disabled = true;
        b.innerText = "GUARDANDO...";

        try {
            const res = await fetch(URL_BASE, {
                method: "POST",
                headers: {
                    "apikey": API_KEY,
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify({ 
                    cliente: c.value.trim(), 
                    precio: parseFloat(p.value) 
                })
            });

            if (!res.ok) throw new Error();
            
            c.value = ""; 
            p.value = "";
            cargar(); // Recargar tras guardar
        } catch (e) {
            alert("Error al intentar guardar el registro.");
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    // Inicializar app
    window.onload = cargar;
    document.getElementById('btnG').onclick = guardar;
</script>
</body>
</html>
