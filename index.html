<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: white; padding: 20px; }
        .con { max-width: 400px; margin: auto; }
        .res { background: #10b981; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; cursor: pointer; }
        .item { background: #1c1d24; padding: 10px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="con">
        <div class="res">TOTAL: <span id="bal">0</span> EUR</div>
        <input type="text" id="cli" placeholder="Cliente">
        <input type="number" id="pre" placeholder="Precio">
        <input type="text" id="rut" placeholder="Ruta">
        <button id="btnG">GUARDAR</button>
        <div id="lst"></div>
    </div>

<script>
    // Primero definimos las funciones para que GitHub las vea limpias
    function cl() {
        window.sb.from('portes').select('*').order('created_at', { ascending: false })
        .then(function(r) {
            if (r.error) return;
            var d = r.data, t = 0, h = "";
            for (var i = 0; i < d.length; i++) {
                t = t + Number(d[i].precio);
                h = h + '<div class="item">' + d[i].cliente + ': ' + d[i].precio + '</div>';
            }
            document.getElementById('bal').innerText = t;
            document.getElementById('lst').innerHTML = h;
        });
    }

    function g() {
        var c = document.getElementById('cli').value;
        var p = document.getElementById('pre').value;
        var r = document.getElementById('rut').value;
        if (!c || !p) return alert("Faltan datos");

        window.sb.from('portes').insert([{ cliente: c, precio: parseInt(p), origen: r }])
        .then(function(res) {
            if (res.error) alert("Error");
            else {
                document.getElementById('cli').value = "";
                document.getElementById('pre').value = "";
                cl();
            }
        });
    }

    // Al final, la configuración pesada
    var u = "https://hkrbyjxspermnedciqrr.supabase.co";
    var k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzE2OSwiZXhwIjoyMDU4NjUzMTY5fQ.mHnZSi6ImFubzcy";
    
    window.sb = window.supabase.createClient(u, k);
    document.getElementById('btnG').onclick = g;
    cl();
</script>
</body>
</html>
