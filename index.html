<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistica Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #10b981; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .item { background: #1e293b; padding: 15px; margin-top: 10px; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div style="max-width:400px; margin:auto;">
        <h2>LOGÍSTICA LUIS</h2>
        <div class="card">
            <div style="font-size:12px;">TOTAL ACUMULADO</div>
            <div id="bal" style="font-size:28px; font-weight:bold;">Conectando...</div>
        </div>
        <input type="text" id="cli" placeholder="Cliente">
        <input type="number" id="pre" placeholder="Precio (€)">
        <button id="btnG">AÑADIR PORTE</button>
        <div id="lst" style="margin-top:20px;"></div>
    </div>

<script>
    const U = "https://hkrbyjxspermnedciqrr.supabase.co";
    const K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo";
    const sb = supabase.createClient(U, K);

    async function cargar() {
        const { data, error } = await sb.from('portes').select('*').order('created_at', { ascending: false });
        if (error) { document.getElementById('bal').innerText = "Error"; return; }
        let total = 0;
        let html = "";
        if (data && data.length > 0) {
            data.forEach(d => {
                total += Number(d.precio || 0);
                html += "<div class='item'><span>"+d.cliente+"</span><b>"+d.precio+"€</b></div>";
            });
            document.getElementById('bal').innerText = total + "€";
        } else {
            document.getElementById('bal').innerText = "0€";
        }
        document.getElementById('lst').innerHTML = html;
    }

    async function guardar() {
        const c = document.getElementById('cli').value;
        const p = document.getElementById('pre').value;
        if (!c || !p) return;
        const { error } = await sb.from('portes').insert([{ cliente: c, precio: parseInt(p) }]);
        if (!error) { 
            document.getElementById('cli').value = ""; 
            document.getElementById('pre').value = ""; 
            cargar(); 
        }
    }

    document.getElementById('btnG').onclick = guardar;
    cargar();
</script>
</body>
</html>
