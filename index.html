<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logística Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: white; padding: 20px; text-align: center; }
        .con { max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .item { background: #1c1d24; padding: 10px; margin-top: 5px; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>
    <div class="con">
        <h2>Logística Luis</h2>
        <div id="bal" style="background:#10b981; padding:15px; border-radius:10px; margin-bottom:10px;">Conectando...</div>
        <input type="text" id="cli" placeholder="Cliente">
        <input type="number" id="pre" placeholder="Precio">
        <button id="btnG">GUARDAR DATOS</button>
        <div id="lst"></div>
    </div>
<script>
    const U = "https://hkrbyjxspermnedciqrr.supabase.co";
    // ESTA ES LA CLAVE COMPLETA CORREGIDA:
    const K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzE2OSwiZXhwIjoyMDU4NjUzMTY5fQ.mHnZSi6ImFubzcy";
    
    const sb = supabase.createClient(U, K);

    async function cargar() {
        const { data, error } = await sb.from('portes').select('*').order('created_at', { ascending: false });
        if (error) { document.getElementById('bal').innerText = "Error: " + error.message; return; }
        let t = 0, h = "";
        if (data) {
            data.forEach(d => {
                t += Number(d.precio || 0);
                h += '<div class="item">' + (d.cliente || 'S/N') + ': ' + (d.precio || 0) + '€</div>';
            });
        }
        document.getElementById('bal').innerText = "TOTAL: " + t + "€";
        document.getElementById('lst').innerHTML = h;
    }

    async function guardar() {
        const c = document.getElementById('cli').value;
        const p = document.getElementById('pre').value;
        if (!c || !p) return alert("Faltan datos");
        const { error } = await sb.from('portes').insert([{ cliente: c, precio: parseInt(p) }]);
        if (error) alert("Error: " + error.message);
        else { document.getElementById('cli').value = ""; document.getElementById('pre').value = ""; cargar(); }
    }
    document.getElementById('btnG').onclick = guardar;
    cargar();
</script>
</body>
</html>
