<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis - Gestión</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        #balance-card { 
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 25px 15px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #bal { font-size: 42px; font-weight: 900; display: block; }
        
        .form-box { 
            background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 20px;
        }
        input { 
            width: 100%; padding: 14px; margin-bottom: 10px; 
            border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; 
            outline: none;
        }
        
        button#btnG { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; font-weight: bold; 
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }

        .item { 
            background: var(--card); padding: 14px; margin-bottom: 8px; 
            border-radius: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--primary);
        }
        .price { font-weight: 800; color: var(--success); font-size: 18px; }

        .error-msg {
            background: #ef4444; color: white; font-size: 12px; text-align: center; 
            padding: 8px; border-radius: 8px; margin-bottom: 10px; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--primary); font-size:18px; margin:0; font-weight:800;">LOGÍSTICA LUIS</h2>
            <button onclick="cargar()" style="background:none; border:1px solid #334155; color:var(--text); padding:5px 10px; border-radius:8px; font-size:11px;">ACTUALIZAR</button>
        </div>

        <div id="error-ui" class="error-msg"></div>

        <div id="balance-card">
            <span style="font-size:11px; font-weight:bold; text-transform:uppercase; opacity:0.9;">Total Hoy</span>
            <span id="bal">0.00€</span>
        </div>

        <div class="form-box">
            <input type="text" id="cli" placeholder="Cliente" autocomplete="off">
            <input type="number" id="pre" placeholder="Importe €" inputmode="decimal" step="any">
            <button id="btnG">GUARDAR</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    const URL_BASE = "https://hkrbyjxspermnedciqrr.supabase.co/rest/v1/logistica_luis";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo";

    async function cargar() {
        const errUI = document.getElementById('error-ui');
        try {
            // Obtenemos solo la parte de la fecha YYYY-MM-DD
            const hoy = new Date().toISOString().split('T')[0];
            
            // Añadimos cache buster para evitar respuestas antiguas
            const url = `${URL_BASE}?select=*&created_at=gte.${hoy}&order=created_at.desc&t=${Date.now()}`;
            
            const res = await fetch(url, {
                method: 'GET',
                headers: { 
                    'apikey': API_KEY,
                    'Authorization': 'Bearer ' + API_KEY
                }
            });

            if (!res.ok) throw new Error("Fallo de servidor");

            const data = await res.json();
            let sum = 0;
            let h = "";
            
            data.forEach(x => {
                const p = parseFloat(x.precio) || 0;
                sum += p;
                h += `<div class="item"><span><b>${x.cliente.toUpperCase()}</b></span><span class="price">${p.toFixed(2)}€</span></div>`;
            });

            document.getElementById('bal').innerText = sum.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = h || "<p style='text-align:center;opacity:0.5;'>No hay portes para hoy.</p>";
            errUI.style.display = 'none';
        } catch (e) {
            errUI.innerText = "Error al conectar. Reintenta.";
            errUI.style.display = 'block';
        }
    }

    async function guardar() {
        const c = document.getElementById('cli');
        const p = document.getElementById('pre');
        const b = document.getElementById('btnG');

        if (!c.value || !p.value) return;

        b.disabled = true;
        b.innerText = "PROCESANDO...";

        try {
            const res = await fetch(URL_BASE, {
                method: "POST",
                headers: {
                    "apikey": API_KEY,
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify({
                    cliente: c.value.trim(),
                    precio: parseFloat(p.value)
                })
            });

            if (!res.ok) throw new Error();

            c.value = ""; 
            p.value = "";
            
            // Recargar tras un pequeño delay para asegurar propagación en DB
            setTimeout(cargar, 500);
        } catch (e) {
            alert("Error al guardar registro.");
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR";
        }
    }

    window.onload = cargar;
    document.getElementById('btnG').onclick = guardar;
</script>
</body>
</html>
