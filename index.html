<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis V2</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; 
            display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 400px; }
        .card-total { 
            background: linear-gradient(135deg, #10b981, #059669); 
            padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        #total { font-size: 48px; font-weight: bold; display: block; }
        .form { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            font-size: 16px; box-sizing: border-box; outline: none; 
        }
        button { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; 
            font-weight: bold; cursor: pointer; 
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .item { 
            background: var(--card); padding: 15px; margin-top: 10px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 5px solid var(--primary);
        }
        .status { text-align: center; font-size: 11px; margin-bottom: 10px; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-text" class="status">INICIALIZANDO...</div>
        
        <div class="card-total">
            <small>INGRESOS DE HOY</small>
            <span id="total">0.00€</span>
        </div>
        
        <div class="form">
            <input type="text" id="cliente" placeholder="Cliente" autocomplete="off">
            <input type="number" id="precio" placeholder="Euros €" step="any" inputmode="decimal">
            <button id="btn-save" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>
        
        <div id="lista"></div>
    </div>

<script>
    const PROJECT_ID = "fuzmifguzpveclqexmsu";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1em1pZmd1enB2ZWNscWV4bXN1Iiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.C6-n-8R_fF-G5g_m-E_r-v_l-p-s-q-t-u-v-w-x-y-z";
    const URL = `https://${PROJECT_ID}.supabase.co/rest/v1/logistica_luis`;

    const headers = {
        'apikey': KEY,
        'Authorization': `Bearer ${KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
    };

    async function cargar() {
        const status = document.getElementById('status-text');
        try {
            const res = await fetch(`${URL}?select=*&order=created_at.desc`, { headers });
            
            if (!res.ok) {
                status.innerHTML = '<span style="color:orange">ERROR DE TABLA</span>';
                return;
            }

            const data = await res.json();
            const hoy = new Date().toLocaleDateString('sv-SE'); 
            
            let suma = 0;
            let html = "";
            
            data.forEach(d => {
                if(d.created_at.startsWith(hoy)) {
                    suma += parseFloat(d.precio);
                    html += `<div class="item"><span>${d.cliente.toUpperCase()}</span><b style="color:var(--success)">${parseFloat(d.precio).toFixed(2)}€</b></div>`;
                }
            });
            
            document.getElementById('total').innerText = suma.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.5">Sin portes hoy</p>';
            status.innerHTML = '<span style="color:var(--success)">● CONECTADO</span>';
        } catch (e) {
            status.innerHTML = '<span style="color:var(--error)">ERROR DE RED</span>';
        }
    }

    async function guardar() {
        const c = document.getElementById('cliente');
        const p = document.getElementById('precio');
        const b = document.getElementById('btn-save');
        
        if(!c.value || !p.value) return;
        
        b.disabled = true;
        b.innerText = "ENVIANDO...";
        
        try {
            const res = await fetch(URL, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ 
                    cliente: c.value.trim(), 
                    precio: parseFloat(p.value) 
                })
            });

            if(!res.ok) {
                const errData = await res.json();
                console.error("Error Supabase:", errData);
                throw new Error("Error en servidor");
            }
            
            c.value = ""; 
            p.value = "";
            await cargar();
        } catch (e) {
            alert("No se pudo guardar. Verifica que el SQL en Supabase se ejecutó correctamente.");
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    window.onload = cargar;
    setInterval(cargar, 15000);
</script>
</body>
</html>
