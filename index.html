<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis V2</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; 
            display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 400px; }
        .card-total { 
            background: linear-gradient(135deg, #10b981, #059669); 
            padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        #total { font-size: 48px; font-weight: bold; display: block; }
        .form { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            font-size: 16px; box-sizing: border-box; outline: none; 
        }
        input:focus { border-color: var(--primary); }
        button { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:disabled { background: #475569; cursor: not-allowed; }
        .item { 
            background: var(--card); padding: 15px; margin-top: 10px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 5px solid var(--primary); animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status { text-align: center; font-size: 11px; margin-bottom: 10px; padding: 5px; font-weight: bold; }
        .online { color: var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-text" class="status online">SISTEMA V2 - CONECTADO</div>
        <div class="card-total">
            <small>INGRESOS DE HOY</small>
            <span id="total">0.00€</span>
        </div>
        <div class="form">
            <input type="text" id="cliente" placeholder="Nombre Cliente" autocomplete="off">
            <input type="number" id="precio" placeholder="Importe €" step="any" inputmode="decimal">
            <button id="btn-save" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>
        <div id="lista" style="margin-top:20px;"></div>
    </div>

<script>
    // Configuración de Supabase
    const BASE_URL = "https://fuzmifguzpveclqexmsu.supabase.co/rest/v1/logistica_luis";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1em1pZmd1enB2ZWNscWV4bXN1Iiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.C6-n-8R_fF-G5g_m-E_r-v_l-p-s-q-t-u-v-w-x-y-z"; 

    async function cargar() {
        try {
            const res = await fetch(`${BASE_URL}?select=*&order=created_at.desc`, {
                headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
            });
            if (!res.ok) throw new Error("Error cargando datos");
            
            const data = await res.json();
            const hoy = new Date().toISOString().split('T')[0]; // Fecha actual en formato YYYY-MM-DD
            
            let suma = 0;
            let html = "";
            
            data.forEach(d => {
                const fechaRegistro = d.created_at.split('T')[0];
                if(fechaRegistro === hoy) {
                    suma += parseFloat(d.precio);
                    html += `
                        <div class="item">
                            <span>${d.cliente.toUpperCase()}</span>
                            <b style="color:var(--success)">${parseFloat(d.precio).toFixed(2)}€</b>
                        </div>`;
                }
            });
            
            document.getElementById('total').innerText = suma.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.5">No hay registros hoy</p>';
        } catch (e) { 
            console.error(e);
            document.getElementById('status-text').innerHTML = '<span style="color:red">ERROR DE CONEXIÓN</span>';
        }
    }

    async function guardar() {
        const c = document.getElementById('cliente');
        const p = document.getElementById('precio');
        const b = document.getElementById('btn-save');
        
        if(!c.value || !p.value) {
            alert("Rellena nombre e importe");
            return;
        }
        
        b.disabled = true;
        b.innerText = "PROCESANDO...";

        try {
            const res = await fetch(BASE_URL, {
                method: 'POST',
                headers: { 
                    'apikey': API_KEY, 
                    'Authorization': `Bearer ${API_KEY}`, 
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    cliente: c.value.trim(), 
                    precio: parseFloat(p.value) 
                })
            });

            if(!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.message || "Fallo en la base de datos");
            }
            
            c.value = ""; 
            p.value = "";
            await cargar();
        } catch (e) {
            alert("Error: " + e.message + "\n\nVerifica los permisos en Supabase.");
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    window.onload = cargar;
</script>
</body>
</html>
