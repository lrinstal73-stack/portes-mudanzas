<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis - Gestión Total</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
            --danger: #ef4444;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        #balance-card { 
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 25px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #bal { font-size: 42px; font-weight: 900; display: block; }
        
        .form-box { 
            background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px;
        }
        input { 
            width: 100%; padding: 15px; margin-bottom: 10px; 
            border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; 
            outline: none;
        }
        
        button#btnG { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-size: 16px; font-weight: bold; 
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }

        .item { 
            background: var(--card); padding: 15px; margin-bottom: 8px; 
            border-radius: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--primary);
        }
        .price { font-weight: 800; color: var(--success); font-size: 18px; }

        #error-display {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 10px; border-radius: 10px;
            margin-bottom: 15px; display: none;
            font-size: 12px; text-align: center;
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--primary); font-size:18px; margin:0;">LOGÍSTICA LUIS</h2>
            <button onclick="cargar()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 10px; border-radius:5px; font-size:11px;">REFRESCAR</button>
        </div>

        <div id="error-display" onclick="this.style.display='none'"></div>

        <div id="balance-card">
            <span style="font-size:11px; font-weight:bold; text-transform:uppercase;">Ganancia Hoy</span>
            <span id="bal">0.00€</span>
        </div>

        <div class="form-box">
            <input type="text" id="cli" placeholder="Nombre del cliente..." autocomplete="off">
            <input type="number" id="pre" placeholder="Importe €" inputmode="decimal" step="any">
            <button id="btnG">GUARDAR REGISTRO</button>
        </div>

        <div id="lista"></div>
    </div>

<script>
    // Configuración manual para evitar fallos de librería
    const URL_REST = "https://hkrbyjxspermnedciqrr.supabase.co/rest/v1/registros";
    const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo";

    function mostrarError(msg) {
        const div = document.getElementById('error-display');
        div.innerText = "Error: " + msg;
        div.style.display = 'block';
    }

    async function cargar() {
        try {
            const hoy = new Date().toISOString().split('T')[0];
            
            const response = await fetch(`${URL_REST}?created_at=gte.${hoy}&select=*&order=created_at.desc`, {
                method: 'GET',
                headers: {
                    'apikey': KEY_SB,
                    'Authorization': `Bearer ${KEY_SB}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error(await response.text());

            const data = await response.json();
            let total = 0;
            let html = "";
            
            data.forEach(d => {
                const val = parseFloat(d.precio) || 0;
                total += val;
                html += `<div class="item"><span><b>${d.cliente}</b></span><span class="price">${val.toFixed(2)}€</span></div>`;
            });
            
            document.getElementById('bal').innerText = total.toFixed(2) + "€";
            document.getElementById('lista').innerHTML = html || "<p style='text-align:center; opacity:0.5;'>Sin registros hoy.</p>";
            document.getElementById('error-display').style.display = 'none';
        } catch (e) {
            mostrarError(e.message);
        }
    }

    async function guardar() {
        const c = document.getElementById('cli');
        const p = document.getElementById('pre');
        const b = document.getElementById('btnG');

        if (!c.value || !p.value) return;

        b.disabled = true;
        b.innerText = "PROCESANDO...";

        try {
            const response = await fetch(URL_REST, {
                method: 'POST',
                headers: {
                    'apikey': KEY_SB,
                    'Authorization': `Bearer ${KEY_SB}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({
                    cliente: c.value.trim(),
                    precio: parseFloat(p.value)
                })
            });

            if (!response.ok) throw new Error(await response.text());

            c.value = ""; 
            p.value = "";
            await cargar();
        } catch (e) {
            mostrarError("Fallo: " + e.message);
        } finally {
            b.disabled = false;
            b.innerText = "GUARDAR REGISTRO";
        }
    }

    // Iniciar
    window.onload = cargar;
    document.getElementById('btnG').onclick = guardar;
</script>
</body>
</html>
