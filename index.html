<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logistica Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: white; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .resumen { background: #10b981; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .card { background: #1c1d24; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="resumen"><b>TOTAL: </b><span id="balance">0</span>€</div>
        <input type="text" id="cliente" placeholder="Cliente">
        <input type="number" id="precio" placeholder="Precio">
        <input type="text" id="ruta" placeholder="Ruta">
        <button id="btnGuardar">GUARDAR</button>
        <div id="lista"></div>
    </div>

<script>
    var url = "https://hkrbyjxspermnedciqrr.supabase.co";
    var key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub255bW91cyIsImlhdCI6MTc0MzA3NzE2OSwiZXhwIjoyMDU4NjUzMTY5fQ.mHnZSi6ImFubzcy";
    var sb = window.supabase.createClient(url, key);

    function cargar() {
        sb.from('portes').select('*').order('created_at', { ascending: false })
        .then(function(r) {
            if (r.error) {
                console.log("Error");
                return;
            }
            var d = r.data;
            var t = 0;
            var h = "";
            for (var i = 0; i < d.length; i++) {
                if (d[i].cliente && d[i].precio) {
                    t = t + Number(d[i].precio);
                    h = h + '<div class="card"><b>' + d[i].cliente + '</b>: ' + d[i].precio + ' EUR</div>';
                }
            }
            document.getElementById('balance').innerText = t;
            document.getElementById('lista').innerHTML = h;
        });
    }

    function guardar() {
        var c = document.getElementById('cliente').value;
        var p = document.getElementById('precio').value;
        var r = document.getElementById('ruta').value;
        if (!c || !p) {
            alert("Faltan datos");
            return;
        }
        sb.from('portes').insert([{ cliente: c, precio: parseInt(p), origen: r }])
        .then(function(res) {
            if (res.error) {
                alert("Error");
            } else {
                document.getElementById('cliente').value = "";
                document.getElementById('precio').value = "";
                document.getElementById('ruta').value = "";
                cargar();
            }
        });
    }

    document.getElementById('btnGuardar').onclick = guardar;
    cargar();
