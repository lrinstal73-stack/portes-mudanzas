<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f1014; color:white; font-family:sans-serif; padding:20px;">
    <div style="max-width:400px; margin:auto;">
        <h2 id="balance">Cargando...</h2>
        <input type="text" id="cliente" placeholder="Cliente" style="width:100%; margin:5px 0; padding:10px;">
        <input type="number" id="precio" placeholder="Precio" style="width:100%; margin:5px 0; padding:10px;">
        <button onclick="guardar()" style="width:100%; padding:10px; background:blue; color:white; border:none;">GUARDAR</button>
        <div id="lista" style="margin-top:20px;"></div>
    </div>

    <script>
        const SB_URL = "https://hkrbyjxspermnedciqrr.supabase.co";
        // PEGA AQUÍ LA CLAVE QUE HAS COPIADO DE TU PANEL AHORA MISMO
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTEyODcsImV4cCI6MjA5MDEyNzI4N30.otABinyJLsAW5Z8bY0mNWX0-Z1RUuugXk1_6Ki3TAeo"; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        async function cargar() {
            const { data, error } = await supabaseClient.from('portes').select('*');
            if (error) { document.getElementById('balance').innerText = "Error API"; return; }
            document.getElementById('balance').innerText = "Total: " + data.reduce((a, b) => a + (Number(b.precio) || 0), 0) + "€";
            document.getElementById('lista').innerHTML = data.map(p => `<div>${p.cliente}: ${p.precio}€</div>`).join('');
        }

        async function guardar() {
            const c = document.getElementById('cliente').value;
            const p = document.getElementById('precio').value;
            const { error } = await supabaseClient.from('portes').insert([{ cliente: c, precio: parseInt(p) }]);
            if (error) alert("Error: " + error.message);
            else { alert("Guardado"); cargar(); }
        }
        cargar();
    </script>
</body>
</html>
