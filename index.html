<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Luis | Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .btn-action { background: #2563eb; color: white; font-weight: 900; transition: all 0.2s; }
        .btn-action:active { transform: scale(0.96); }
        input { border: 2px solid #e2e8f0 !important; border-radius: 1rem !important; outline: none !important; }
        input:focus { border-color: #2563eb !important; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div class="space-y-6">
        <div class="card p-8 bg-gradient-to-br from-blue-600 to-blue-800 text-white border-none shadow-xl shadow-blue-200">
            <p class="text-[10px] font-black text-blue-100 uppercase tracking-widest mb-1">Total de Hoy</p>
            <div id="total" class="text-6xl font-black tracking-tighter">0.00€</div>
            <div class="mt-4">
                <span id="status-badge" class="px-3 py-1 rounded-full bg-blue-500/50 text-[10px] font-bold">CONECTANDO...</span>
            </div>
        </div>

        <div class="card p-6 shadow-sm">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Cliente</label>
                    <input id="in-cliente" type="text" placeholder="NOMBRE DEL CLIENTE" class="w-full p-4 bg-slate-50 font-bold uppercase text-slate-700">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Importe</label>
                    <div class="relative">
                        <input id="in-precio" type="number" step="0.01" inputmode="decimal" placeholder="0.00" class="w-full p-4 bg-slate-50 font-black text-slate-900 text-2xl">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-slate-300">€</span>
                    </div>
                </div>
                <button id="btn-save" class="btn-action w-full py-5 rounded-2xl shadow-lg shadow-blue-100 uppercase tracking-widest">
                    Guardar Registro
                </button>
            </div>
        </div>

        <div id="list" class="space-y-3">
            <div class="text-center py-10 opacity-20 font-bold uppercase text-xs">Cargando...</div>
        </div>
    </div>

    <script>
        (function() {
            // Configuración Supabase + Proxy de emergencia
            const PROXY = 'https://cors-anywhere.herokuapp.com/'; 
            const BASE_URL = 'https://hkrbjxspermnedciqrr.supabase.co/rest/v1/logistica_luis';
            const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJqeHNwZXJtbmVkY2lxcnIiLCJyb2xlIjoiYW5vbnltdXMiLCJpYXQiOjE3NDMwODExNDh9.V_r-tXw6X-s-p-s-q-t-u-v-w-x-y-z';

            const headers = (isPost) => ({
                'apikey': API_KEY,
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json',
                ...(isPost && { 'Prefer': 'return=minimal' })
            });

            const load = async (useProxy = false) => {
                const url = useProxy ? PROXY + BASE_URL : BASE_URL;
                try {
                    const res = await fetch(`${url}?select=*&order=created_at.desc`, { headers: headers(false) });
                    if (!res.ok) throw new Error('CORS');
                    
                    const data = await res.json();
                    const hoy = new Date().toLocaleDateString('en-CA');
                    let suma = 0;
                    let html = '';

                    data.forEach(item => {
                        if (item.created_at.startsWith(hoy)) {
                            const p = parseFloat(item.precio) || 0;
                            suma += p;
                            html += `
                                <div class="card p-4 flex justify-between items-center border-l-4 border-l-blue-500 shadow-sm">
                                    <span class="font-black text-slate-700 uppercase text-xs">${item.cliente}</span>
                                    <span class="font-black text-blue-600 text-lg">${p.toFixed(2)}€</span>
                                </div>`;
                        }
                    });

                    document.getElementById('total').innerText = `${suma.toFixed(2)}€`;
                    document.getElementById('list').innerHTML = html || '<div class="text-center py-10 text-slate-300 font-bold uppercase text-[10px]">Sin actividad hoy</div>';
                    document.getElementById('status-badge').innerText = useProxy ? 'MODO PROXY ACTIVO' : 'SISTEMA ONLINE';
                    document.getElementById('status-badge').className = 'px-3 py-1 rounded-full bg-emerald-500 text-[10px] font-bold text-white';
                } catch (e) {
                    if (!useProxy) {
                        console.warn("Fallo directo. Reintentando por Proxy...");
                        load(true);
                    } else {
                        document.getElementById('status-badge').innerText = 'ERROR DE CONEXIÓN';
                        document.getElementById('status-badge').className = 'px-3 py-1 rounded-full bg-rose-500 text-[10px] font-bold text-white';
                    }
                }
            };

            const save = async () => {
                const c = document.getElementById('in-cliente');
                const p = document.getElementById('in-precio');
                const b = document.getElementById('btn-save');
                if (!c.value || !p.value) return;

                b.disabled = true;
                b.innerText = 'GUARDANDO...';

                try {
                    let res = await fetch(BASE_URL, {
                        method: 'POST',
                        headers: headers(true),
                        body: JSON.stringify({ cliente: c.value.trim().toUpperCase(), precio: parseFloat(p.value) })
                    });
                    
                    if (!res.ok) {
                        res = await fetch(PROXY + BASE_URL, {
                            method: 'POST',
                            headers: headers(true),
                            body: JSON.stringify({ cliente: c.value.trim().toUpperCase(), precio: parseFloat(p.value) })
                        });
                    }

                    c.value = ''; p.value = '';
                    load(document.getElementById('status-badge').innerText.includes('PROXY'));
                } catch (e) {
                    alert('Error al guardar. Revisa la conexión.');
                } finally {
                    b.disabled = false;
                    b.innerText = 'GUARDAR REGISTRO';
                }
            };

            document.getElementById('btn-save').onclick = save;
            load();
        })();
    </script>
</body>
</html>
